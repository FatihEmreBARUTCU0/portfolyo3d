<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Basic Test</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      body { background: #06040a; }
      .wrap {
        position: fixed;
        inset: 0;
        overflow: hidden;
        background: #06040a;
      }
      video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        min-width: 100%;
        min-height: 100%;
        object-fit: cover;
      }
      .label {
        position: fixed;
        top: 24px;
        left: 24px;
        z-index: 2;
        color: #d5ff3f;
        font: 18px/1.4 sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <video id="v" src="assets/hero.mp4" autoplay loop muted playsinline preload="auto"></video>
    </div>
    <div class="label" id="status">loading…</div>
    <script>
      var v = document.getElementById("v");
      var s = document.getElementById("status");
      function report() {
        s.textContent =
          "videoWidth=" + v.videoWidth +
          " videoHeight=" + v.videoHeight +
          " readyState=" + v.readyState +
          " paused=" + v.paused +
          " error=" + (v.error ? v.error.code : "none");
      }
      v.addEventListener("loadeddata", report);
      v.addEventListener("playing", report);
      v.addEventListener("error", report);
      setTimeout(report, 2000);
    </script>
  </body>
</html>
